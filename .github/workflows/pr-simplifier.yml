name: "✨ PR Simplifier"

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths-ignore:
      - '**/*.md'
      - '**/*.txt'
      - 'docs/**'
      - '.github/**'
      - '**/*.png'
      - '**/*.jpg'
      - '**/*.jpeg'
      - '**/*.gif'
      - '**/*.svg'
      - '**/*.webp'

permissions:
  contents: read
  pull-requests: write

jobs:
  simplify-review:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Collect changed files
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          git diff --name-only "$BASE_SHA" "$HEAD_SHA" > changed-files.txt
          echo "Changed files:" && cat changed-files.txt

      - name: Run Claude simplifier pass
        if: env.CLAUDE_CODE_OAUTH_TOKEN != ''
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: "--model sonnet --max-turns 20 --allowedTools Bash,View,GlobTool,GrepTool,GitHub"
          prompt: |
            You are performing a PR simplification review.

            Goal:
            - Find opportunities to simplify code in this PR without changing behavior.
            - Prefer reducing complexity, duplication, unnecessary abstraction, and dead code.

            Scope:
            - ONLY review files changed in this PR (see `changed-files.txt`).
            - Use `git diff` and file reads to inspect current changes.

            Required workflow:
            1) Run a simplify pass over changed files (equivalent intent to `/simplify`).
            2) Identify the top 3-8 high-impact simplification suggestions.
            3) For each suggestion include:
               - File path
               - Why current approach is more complex than needed
               - Concrete simpler alternative (small patch-level guidance)
               - Estimated impact (readability/maintainability/risk)
            4) If no meaningful simplifications are found, explicitly say so.
            5) Post or update ONE PR comment (do not spam) using marker:
               `<!-- pr-simplifier-bot-comment -->`

            Comment format:
            - Title: "✨ PR Simplifier Suggestions"
            - Brief summary
            - Bullet list of recommendations
            - Final section: "No-blocking note" clarifying these are recommendations, not merge blockers.

      - name: Skip note when Claude token is missing
        if: env.CLAUDE_CODE_OAUTH_TOKEN == ''
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const issue_number = context.payload.pull_request.number;
            const marker = '<!-- pr-simplifier-bot-comment -->';
            const body = [
              marker,
              '✨ **PR Simplifier Suggestions**',
              '',
              'Skipped: `CLAUDE_CODE_OAUTH_TOKEN` is not configured for this repository.',
              '',
              'No simplification review was performed in this run.'
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({ owner, repo, issue_number });
            const existing = comments.find(c => c.body.includes(marker) && c.user.login === 'github-actions[bot]');
            if (existing) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number, body });
            }
